kind = "web"
previewPath = "/"
title = "Code Storage"
version = "1.0.0"
id = "artifacts/code-storage"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20234

[services.development]
run = "pnpm --filter @workspace/code-storage run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code-storage", "run", "build" ]
publicDir = "artifacts/code-storage/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20234"
BASE_PATH = "/"
